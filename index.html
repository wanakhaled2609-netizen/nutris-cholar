<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriScholar | مساعد التغذية السريري المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --accent: #3498db;
            --danger: #e74c3c;
            --bg-color: #cfe1b9; 
            --input-bg: #ffffff; 
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        .container { display: flex; width: 100%; }
        .portal { flex: 1; padding: 40px; transition: 0.3s; }
        .patient-portal { background-color: rgba(255, 255, 255, 0.3); border-left: 2px solid rgba(0,0,0,0.1); }
        
        h2, h3 { color: var(--primary); border-bottom: 3px solid var(--secondary); padding-bottom: 10px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #99aaa0; 
            border-radius: 8px; box-sizing: border-box; font-size: 16px; 
            background-color: var(--input-bg); font-family: 'Cairo';
        }

        .result-box, .alert-box { padding: 15px; border-radius: 8px; margin-top: 10px; display: none; font-weight: bold; }
        
        button {
            background-color: var(--secondary); color: white; padding: 15px;
            border: none; border-radius: 8px; cursor: pointer; font-size: 18px;
            font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s;
        }
        .btn-pdf { background-color: #e67e22; margin-top: 10px; }
        button:hover { opacity: 0.9; }

        .diet-plan {
            margin-top: 30px; padding: 25px; background: white;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none;
        }

        .nutrient-badge {
            background: #f1f2f6; border-right: 4px solid var(--accent);
            padding: 10px; margin: 5px 0; font-size: 14px;
        }

        .food-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .allowed { color: #27ae60; background: #e8f5e9; padding: 10px; border-radius: 5px; }
        .restricted { color: #e74c3c; background: #ffebee; padding: 10px; border-radius: 5px; }

        @media (max-width: 768px) { .container { flex-direction: column; } .food-list { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="portal patient-portal">
        <h2>بوابة المريض</h2>
        <div class="form-group">
            <label>الاسم الكامل</label>
            <input type="text" id="pName" placeholder="أدخل الاسم">
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;"><label>العمر</label><input type="number" id="pAge"></div>
            <div class="form-group" style="flex: 1;"><label>الوزن (كجم)</label><input type="number" id="pWeight"></div>
            <div class="form-group" style="flex: 1;"><label>الطول (سم)</label><input type="number" id="pHeight"></div>
        </div>
        <div class="form-group">
            <label>الجنس</label>
            <select id="gender" onchange="checkHealthStatus()">
                <option value="male">ذكر</option>
                <option value="female">أنثى</option>
            </select>
        </div>
        <div class="form-group">
            <label>تحديد المرض المصاحب</label>
            <select id="disease">
                <option value="none">لا يوجد (شخص صحي)</option>
                <option value="hypertension">ارتفاع ضغط الدم</option>
                <option value="diabetes_1">مريض سكر (النوع الأول)</option>
                <option value="diabetes_2">مريض سكر (النوع الثاني)</option>
                <option value="heart_disease">أمراض القلب</option>
                <option value="diabetes_heart">مريض سكر مع مرض في القلب</option>
            </select>
        </div>
        <div class="form-group">
            <label>مستوى النشاط البدني</label>
            <select id="activityLevel">
                <option value="1.2">خامل (قليل أو لا يمارس الرياضة)</option>
                <option value="1.375">نشاط خفيف (رياضة 1-3 أيام/أسبوع)</option>
                <option value="1.55">نشاط متوسط (رياضة 3-5 أيام/أسبوع)</option>
                <option value="1.725">نشاط عالٍ (رياضة يومية شاقة)</option>
            </select>
        </div>
        <div class="form-group">
            <label>تشخيصات أخرى</label>
            <textarea id="otherDiagnosis" rows="2"></textarea>
        </div>
    </div>

    <div class="portal specialist-portal">
        <h2>لوحة تحكم الأخصائي</h2>
        <div class="form-group">
            <label>1. طول الذراع (سم) -> المنتصف: <span id="midValue" style="color:var(--secondary)">0</span> سم</label>
            <input type="number" id="armLength" oninput="calculateMidpoint()">
        </div>
        <div class="form-group">
            <label>2. محيط الذراع (MUAC) - سم</label>
            <input type="number" id="muac" oninput="checkHealthStatus()">
            <div id="muacAlert" class="alert-box"></div>
        </div>
        <div class="form-group">
            <label>3. محيط الخصر (سم)</label>
            <input type="number" id="waist" oninput="checkHealthStatus()">
            <div id="waistAlert" class="alert-box"></div>
        </div>

        <button onclick="generateDietPlan()">إنشاء الخطة والوجبات</button>

        <div id="dietResult" class="diet-plan">
            <div id="pdfContent">
                <h3 id="dietTitle"></h3>
                <div id="patientInfoSummary" style="margin-bottom: 15px; font-size: 0.9em; color: #555; background: #f9f9f9; padding: 10px; border-radius: 8px;"></div>
                <div id="nutrientInfo"></div>
                <div id="dietContent"></div>
                <div class="food-list" id="foodLists"></div>
                <hr>
                <h4>اقتراحات الوجبات اليومية:</h4>
                <div id="aiMeals"></div>
            </div>
            <button class="btn-pdf" onclick="saveAsPDF()">حفظ التقرير كـ PDF</button>
        </div>
    </div>
</div>

<script>
    function calculateMidpoint() {
        let length = document.getElementById('armLength').value;
        document.getElementById('midValue').innerText = length ? (length / 2).toFixed(1) : 0;
    }

    function checkHealthStatus() {
        let muac = parseFloat(document.getElementById('muac').value);
        let gender = document.getElementById('gender').value;
        let muacAlert = document.getElementById('muacAlert');
        if(muac > 0) {
            let status = (gender === 'male' ? (muac > 28 ? "سمنة" : (muac == 28 ? "طبيعي" : "نحافة")) : (muac > 25 ? "سمنة" : (muac == 25 ? "طبيعي" : "نحافة")));
            muacAlert.style.display = 'block';
            muacAlert.innerText = `حالة الجسم: ${status}`;
            muacAlert.style.backgroundColor = status === "طبيعي" ? "#e8f5e9" : "#ffebee";
        }
    }

    function generateDietPlan() {
        const name = document.getElementById('pName').value || "المريض";
        const age = parseFloat(document.getElementById('pAge').value);
        const weight = parseFloat(document.getElementById('pWeight').value);
        const height = parseFloat(document.getElementById('pHeight').value);
        const gender = document.getElementById('gender').value;
        const disease = document.getElementById('disease').value;
        const activity = parseFloat(document.getElementById('activityLevel').value);

        if (!weight || !height || !age) {
            alert("يرجى إكمال البيانات الحيوية للمريض أولاً.");
            return;
        }

        // 1. حساب مؤشر كتلة الجسم BMI
        const bmi = (weight / ((height / 100) ** 2)).toFixed(1);
        let bmiStatus = (bmi < 18.5) ? "نحافة" : (bmi < 25) ? "وزن مثالي" : (bmi < 30) ? "زيادة وزن" : "سمنة";

        // 2. حساب الوزن المثالي (IBW) بناءً على المعادلة الجديدة
        // المعادلة: (الطول - 100) - ((الطول - 150) / (4 للذكر أو 2 للأنثى))
        let factor = (gender === 'male') ? 4 : 2;
        let ibw = (height - 100) - ((height - 150) / factor);

        // 3. تحديد الوزن المستخدم في الحسابات (IBW أو AjBW)
        let usedWeight = ibw;
        let weightTypeLabel = "الوزن المثالي (IBW)";

        if (bmi < 18.5 || bmi >= 25) {
            // استخدام قانون AjBW
            usedWeight = ibw + 0.4 * (weight - ibw);
            weightTypeLabel = "الوزن المعدل (AjBW)";
        }

        // 4. حساب BMR بناءً على الوزن الناتج (usedWeight)
        let bmr;
        if (gender === 'male') {
            bmr = (10 * usedWeight) + (6.25 * height) - (5 * age) + 5;
        } else {
            bmr = (10 * usedWeight) + (6.25 * height) - (5 * age) - 161;
        }

        const totalCalories = Math.round(bmr * activity);

        document.getElementById('dietResult').style.display = 'block';
        document.getElementById('patientInfoSummary').innerHTML = `
            <b>الاسم:</b> ${name} | <b>BMI:</b> ${bmi} (${bmiStatus}) <br>
            <b>${weightTypeLabel}:</b> ${usedWeight.toFixed(1)} كجم | 
            <b>BMR:</b> ${Math.round(bmr)} سعرة | 
            <b>السعرات الكلية:</b> ${totalCalories} سعرة/يوم
        `;

        let plan = { title: "", nutrients: "", allowed: "", restricted: "", meals: "" };

        if (disease === "hypertension") {
            plan.title = "نظام DASH الغذائي";
            plan.nutrients = "Carb 55% | Protein 18% | Low Sodium";
            plan.allowed = "الموز، الكرفس، منتجات الألبان قليلة الدسم، الحبوب الكاملة، الأسماك.";
            plan.restricted = "ملح الطعام، الأطعمة المعلبة، اللحوم الحمراء الدهنية.";
            plan.meals = "إفطار: زبادي وتفاحة | غداء: سمك مشوي وسلطة خضراء | عشاء: شوربة عدس قليلة الملح.";
        } else if (disease.includes("diabetes")) {
            plan.title = "نظام ضبط مؤشر السكر";
            plan.nutrients = "Carb 45% | Fiber 30g+ | Protein 25%";
            plan.allowed = "البقوليات، الخضروات الورقية، خبز النخالة، المكسرات.";
            plan.restricted = "السكر الأبيض، الخبز الأبيض، العصائر المحلاة.";
            plan.meals = "إفطار: بيضتين مسلوقتين وخبز أسمر | غداء: صدر دجاج وفاصوليا خضراء | عشاء: جبنة قريش وخيار.";
        } else if (disease === "heart_disease") {
            plan.title = "نظام صحة القلب (Mediterranean)";
            plan.nutrients = "Healthy Fats 35% | Carb 45% | Fiber High";
            plan.allowed = "زيت الزيتون، الأفوكادو، السلمون، الجوز، التوتيات.";
            plan.restricted = "الدهون المشبعة، السمن، الحلويات، المقليات.";
            plan.meals = "إفطار: توست أسمر بلبنة وزعتر | غداء: معكرونة حبوب كاملة بالخضار | عشاء: سلطة تونة.";
        } else {
            plan.title = "نظام التغذية المتوازن";
            plan.nutrients = "Carb 50% | Protein 20% | Fat 30%";
            plan.allowed = "تنوع في كافة المجموعات الغذائية الطبيعية.";
            plan.restricted = "المشروبات الغازية، الوجبات السريعة، الزيوت المهدرجة.";
            plan.meals = "إفطار: جبنة مع شريحة توست | غداء: أرز مطهو ودجاج وخضار | عشاء: كوب زبادي بفاكهة.";
        }

        document.getElementById('dietTitle').innerText = plan.title;
        document.getElementById('nutrientInfo').innerHTML = `<div class="nutrient-badge">${plan.nutrients}</div>`;
        document.getElementById('foodLists').innerHTML = `
            <div class="allowed"><b>✅ المسموح:</b><br>${plan.allowed}</div>
            <div class="restricted"><b>❌ الممنوع:</b><br>${plan.restricted}</div>
        `;
        document.getElementById('aiMeals').innerHTML = plan.meals;
    }

    function saveAsPDF() {
        const report = document.getElementById('pdfContent');
        // guard against empty/hidden content
        if (!report || report.textContent.trim() === "") {
            alert('الرجاء إنشاء الخطة أولاً ثم حاول حفظ PDF.');
            return;
        }

        // html2pdf has problems when the element is hidden; clone and force visibility
        const clone = report.cloneNode(true);
        clone.style.display = 'block';
        clone.style.position = 'absolute';
        clone.style.left = '-9999px';
        document.body.appendChild(clone);

        const opt = {
            margin: 10,
            filename: 'NutriScholar_Report.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // use callback style and remove clone when done
        html2pdf(clone, opt)
            .then(() => {
                document.body.removeChild(clone);
            })
            .catch(err => {
                console.error('PDF generation error', err);
                alert('حدث خطأ أثناء إنشاء PDF. تحقق من وحدة التحكم.');
                document.body.removeChild(clone);
            });
    }
</script>

</body>
</html>
